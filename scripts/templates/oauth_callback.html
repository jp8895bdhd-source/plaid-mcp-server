<!DOCTYPE html>
<html>
<head>
    <title>Plaid OAuth Callback</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Completing Connection...</h1>
    <div id="status"><div class="status info">Finishing OAuth flow...</div></div>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script>
        // Retrieve the link token from localStorage (saved before OAuth redirect)
        const linkToken = localStorage.getItem('plaid_link_token');
        if (!linkToken) {
            document.getElementById('status').innerHTML =
                '<div class="status error">No link token found. Please start over at <a href="/">Connect Bank</a>.</div>';
        } else {
            const handler = Plaid.create({
                token: linkToken,
                receivedRedirectUri: window.location.href,
                onSuccess: async (publicToken, metadata) => {
                    document.getElementById('status').innerHTML =
                        '<div class="status info">Exchanging token for ' + metadata.institution.name + '...</div>';

                    const response = await fetch('/exchange', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            public_token: publicToken,
                            institution_id: metadata.institution.institution_id,
                            institution_name: metadata.institution.name,
                            accounts: metadata.accounts.map(a => ({
                                id: a.id, name: a.name, type: a.type,
                                subtype: a.subtype, mask: a.mask,
                            })),
                        }),
                    });
                    const data = await response.json();
                    if (data.success) {
                        localStorage.removeItem('plaid_link_token');
                        document.getElementById('status').innerHTML =
                            '<div class="status success">Connected ' + metadata.institution.name +
                            ' (' + metadata.accounts.length + ' accounts). You can close this page.</div>';
                    } else {
                        document.getElementById('status').innerHTML =
                            '<div class="status error">Error: ' + data.error + '</div>';
                    }
                },
                onExit: (err) => {
                    if (err) {
                        document.getElementById('status').innerHTML =
                            '<div class="status error">' + err.error_code + ': ' + err.error_message + '</div>';
                    }
                },
            });
            handler.open();
        }
    </script>
</body>
</html>
